# ═══════════════════════════════════════════════════════════════════
#  Great Expectations — Suite de Validation "credit_card_suite"
#  Pipeline Zéro Défaut — Version Finale
#  Modèle retenu : Gradient Boosting | Seuil = 0.13
# ═══════════════════════════════════════════════════════════════════

expectation_suite_name: credit_card_suite_final

meta:
  great_expectations_version: "0.15.x"
  created_by: "Pipeline Zéro Défaut — Version Finale"
  dataset: "UCI Credit Card Default"
  modele_retenu: "Gradient Boosting"
  seuil_optimal: 0.13
  description: >
    Règles de validation strictes pour le dataset UCI Credit Card.
    Toute violation de sévérité HIGH ou CRITICAL bloque le pipeline.
    Les violations LOW sont journalisées sans blocage.

# ═══════════════════════════════════════════════════════════════════
#  SECTION 1 — STRUCTURE DU DATASET
# ═══════════════════════════════════════════════════════════════════
expectations:

  - expectation_type: expect_table_columns_to_match_ordered_list
    kwargs:
      column_list:
        - ID
        - LIMIT_BAL
        - SEX
        - EDUCATION
        - MARRIAGE
        - AGE
        - PAY_0
        - PAY_2
        - PAY_3
        - PAY_4
        - PAY_5
        - PAY_6
        - BILL_AMT1
        - BILL_AMT2
        - BILL_AMT3
        - BILL_AMT4
        - BILL_AMT5
        - BILL_AMT6
        - PAY_AMT1
        - PAY_AMT2
        - PAY_AMT3
        - PAY_AMT4
        - PAY_AMT5
        - PAY_AMT6
        - default.payment.next.month
    meta:
      severity: CRITICAL
      description: "Les 25 colonnes doivent être présentes dans le bon ordre"

  - expectation_type: expect_table_row_count_to_be_between
    kwargs:
      min_value: 1000
      max_value: 1000000
    meta:
      severity: HIGH
      description: "Volume minimal pour un entraînement fiable"

# ═══════════════════════════════════════════════════════════════════
#  SECTION 2 — UNICITÉ ET VALEURS MANQUANTES
# ═══════════════════════════════════════════════════════════════════

  - expectation_type: expect_column_values_to_be_unique
    kwargs:
      column: ID
    meta:
      severity: CRITICAL
      description: "Chaque client doit avoir un identifiant unique"

  - expectation_type: expect_column_values_to_not_be_null
    kwargs:
      column: LIMIT_BAL
      mostly: 1.0
    meta:
      severity: HIGH

  - expectation_type: expect_column_values_to_not_be_null
    kwargs:
      column: AGE
      mostly: 1.0
    meta:
      severity: HIGH

  - expectation_type: expect_column_values_to_not_be_null
    kwargs:
      column: default.payment.next.month
      mostly: 1.0
    meta:
      severity: CRITICAL
      description: "La variable cible ne peut jamais être manquante"

# ═══════════════════════════════════════════════════════════════════
#  SECTION 3 — RÈGLES MÉTIER PAR COLONNE
# ═══════════════════════════════════════════════════════════════════

  # AGE : clients majeurs uniquement
  - expectation_type: expect_column_values_to_be_between
    kwargs:
      column: AGE
      min_value: 18
      max_value: 100
      mostly: 1.0
    meta:
      severity: HIGH
      description: "Règle KYC — seuls les clients majeurs sont acceptés"

  # LIMIT_BAL : crédit non négatif
  - expectation_type: expect_column_values_to_be_between
    kwargs:
      column: LIMIT_BAL
      min_value: 0
      max_value: 5000000
      mostly: 1.0
    meta:
      severity: HIGH
      description: "Une limite de crédit ne peut pas être négative"

  # SEX : uniquement 1 (Homme) ou 2 (Femme)
  - expectation_type: expect_column_values_to_be_in_set
    kwargs:
      column: SEX
      value_set: [1, 2]
      mostly: 1.0
    meta:
      severity: MEDIUM

  # EDUCATION : valeurs documentées 1-4, tolérance sur 0/5/6
  - expectation_type: expect_column_values_to_be_in_set
    kwargs:
      column: EDUCATION
      value_set: [0, 1, 2, 3, 4, 5, 6]
      mostly: 1.0
    meta:
      severity: MEDIUM
      description: >
        Valeurs officielles : 1=supérieur, 2=université, 3=lycée, 4=autre.
        Les codes 0, 5, 6 sont non documentés et seront remappés vers 4.

  # MARRIAGE
  - expectation_type: expect_column_values_to_be_in_set
    kwargs:
      column: MARRIAGE
      value_set: [0, 1, 2, 3]
      mostly: 1.0
    meta:
      severity: LOW
      description: "Le code 0 est non documenté — remappé vers 3 (autre)"

  # TARGET : strictement binaire
  - expectation_type: expect_column_values_to_be_in_set
    kwargs:
      column: default.payment.next.month
      value_set: [0, 1]
      mostly: 1.0
    meta:
      severity: CRITICAL
      description: "La variable cible doit être binaire 0/1"

  # Taux de défaut dans une plage raisonnable
  - expectation_type: expect_column_mean_to_be_between
    kwargs:
      column: default.payment.next.month
      min_value: 0.05
      max_value: 0.50
    meta:
      severity: HIGH
      description: >
        Alerte drift : si le taux de défaut sort de [5%, 50%],
        la population cible a probablement changé.

# ═══════════════════════════════════════════════════════════════════
#  SECTION 4 — COLONNES PAY_AMT (remboursements non négatifs)
# ═══════════════════════════════════════════════════════════════════

  - expectation_type: expect_column_values_to_be_between
    kwargs:
      column: PAY_AMT1
      min_value: 0
    meta:
      severity: HIGH
      description: "Un remboursement ne peut pas être négatif"

  - expectation_type: expect_column_values_to_be_between
    kwargs:
      column: PAY_AMT2
      min_value: 0
    meta:
      severity: HIGH

  - expectation_type: expect_column_values_to_be_between
    kwargs:
      column: PAY_AMT3
      min_value: 0
    meta:
      severity: HIGH

  - expectation_type: expect_column_values_to_be_between
    kwargs:
      column: PAY_AMT4
      min_value: 0
    meta:
      severity: HIGH

  - expectation_type: expect_column_values_to_be_between
    kwargs:
      column: PAY_AMT5
      min_value: 0
    meta:
      severity: HIGH

  - expectation_type: expect_column_values_to_be_between
    kwargs:
      column: PAY_AMT6
      min_value: 0
    meta:
      severity: HIGH

# ═══════════════════════════════════════════════════════════════════
#  SECTION 5 — STATUTS DE RETARD (PAY_0 à PAY_6)
# ═══════════════════════════════════════════════════════════════════

  - expectation_type: expect_column_values_to_be_between
    kwargs:
      column: PAY_0
      min_value: -2
      max_value: 9
      mostly: 1.0
    meta:
      severity: MEDIUM
      description: >
        Échelle : -2=pas de consommation, -1=payé en avance,
        0=ponctuel, 1..9=mois de retard

  - expectation_type: expect_column_values_to_be_between
    kwargs:
      column: PAY_2
      min_value: -2
      max_value: 9
      mostly: 1.0
    meta:
      severity: MEDIUM

  - expectation_type: expect_column_values_to_be_between
    kwargs:
      column: PAY_3
      min_value: -2
      max_value: 9
      mostly: 1.0
    meta:
      severity: MEDIUM

# ═══════════════════════════════════════════════════════════════════
#  SECTION 6 — DISTRIBUTION ET STABILITÉ
# ═══════════════════════════════════════════════════════════════════

  # Médiane LIMIT_BAL dans une plage cohérente
  - expectation_type: expect_column_median_to_be_between
    kwargs:
      column: LIMIT_BAL
      min_value: 10000
      max_value: 500000
    meta:
      severity: HIGH
      description: >
        Alerte drift : si la médiane de LIMIT_BAL sort de cette plage,
        la politique de crédit a probablement changé.

  # Âge moyen cohérent
  - expectation_type: expect_column_mean_to_be_between
    kwargs:
      column: AGE
      min_value: 20
      max_value: 60
    meta:
      severity: MEDIUM
      description: "Alerte si la clientèle vieillit ou rajeunit anormalement"

# ═══════════════════════════════════════════════════════════════════
#  SECTION 7 — ANTI FUITE DE DONNÉES
# ═══════════════════════════════════════════════════════════════════

  - expectation_type: expect_column_to_not_exist
    kwargs:
      column: DEFAULT
    meta:
      severity: CRITICAL
      description: >
        Fuite de données : la variable cible encodée ne doit jamais
        apparaître dans les features d'entraînement.

  - expectation_type: expect_column_to_not_exist
    kwargs:
      column: default_encoded
    meta:
      severity: CRITICAL

  - expectation_type: expect_column_to_not_exist
    kwargs:
      column: date_of_default
    meta:
      severity: CRITICAL
      description: "Aucune date de défaut futur ne doit être présente"

